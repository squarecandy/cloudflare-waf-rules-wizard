# =============================================================================
# sqcdy-fast-404.conf — Broad 404/4xx filter
#
# Catches any request returning 4xx, ignoring common static asset extensions.
# Single-file filter — edit here, then deploy and reload:
#   scp fail2ban-filters/sqcdy-fast-404.conf user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
failregex = ^<HOST>.*"(GET|POST).*" (404|444|403|400) .*$
ignoreregex = \.(jpg|jpeg|png|gif|css|js|svg|woff|woff2|ttf)$
