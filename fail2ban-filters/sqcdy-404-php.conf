# =============================================================================
# sqcdy-404-php.conf — PHP file 404 filter
#
# Catches probes for .php files that return 4xx responses.
# See also: sqcdy-php-redirect.conf for 301/302 probes (separate jail/threshold).
# Single-file filter — edit here, then deploy and reload:
#   scp fail2ban-filters/sqcdy-404-php.conf user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
# {^LN-BEG} fallback handles empty [] timestamps produced by nginx 444 responses.
datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}
failregex = ^<HOST> - - \[.*\] "(GET|POST) [^" ]*\.php[^" ]* .*" (404|444|403|400)
