# =============================================================================
# sqcdy-php-redirect.conf — PHP file redirect probe filter
#
# Catches probes for .php files that return 301/302, excluding wp-admin and
# wp-login (which are handled by sqcdy-wp-login). Higher threshold than the
# 4xx filter (sqcdy-404-php) to reduce false positives from legitimate
# redirects (http→https, trailing-slash normalization, etc.).
# Single-file filter — edit here, then deploy and reload:
#   scp fail2ban-filters/sqcdy-php-redirect.conf user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
# {^LN-BEG} fallback handles empty [] timestamps produced by nginx 444 responses.
datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}
failregex = ^<HOST> - - \[.*\] "(GET|POST) (?!/wp-admin/)(?!/wp-login\.php)[^" ]*\.php[^" ]* .*" (301|302)
