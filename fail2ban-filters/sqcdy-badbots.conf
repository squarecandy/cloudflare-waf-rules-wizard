# =============================================================================
# sqcdy-badbots.conf — Bad bot user-agent filter
#
# failregex lives here. badbotscustom is set in sqcdy-badbots.local, which is
# auto-generated by generate-fail2ban-filters.php from rules.php.
#
# Deploy both files:
#   scp fail2ban-filters/sqcdy-badbots.conf user@host:/etc/fail2ban/filter.d/
#   scp fail2ban-filters/sqcdy-badbots.local user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
# {^LN-BEG} fallback handles empty [] timestamps produced by nginx 444 responses.
datepattern = ^[^\[]*\[({DATE})
              {^LN-BEG}
# badbotscustom is overridden by sqcdy-badbots.local (auto-generated; do not edit here).
badbotscustom =

# (?i) = case-insensitive; patterns in rules.php are lowercase but real UAs are mixed-case.
# [^"]* instead of .*? avoids backtracking risk inside quoted log fields.
failregex = (?i)^<HOST> - - \[.*?\] "\S+ [^"]*" \d+ \d+ "[^"]*" "[^"]*%(badbotscustom)s[^"]*"
