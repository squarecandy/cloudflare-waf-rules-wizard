# =============================================================================
# sqcdy-wp-custom.conf — WordPress path probe filter
#
# failregex lives here. wpcustompaths is set in sqcdy-wp-custom.local, which is
# auto-generated by generate-fail2ban-filters.php from $wp_path_strings in rules.php.
#
# Deploy both files:
#   scp fail2ban-filters/sqcdy-wp-custom.conf user@host:/etc/fail2ban/filter.d/
#   scp fail2ban-filters/sqcdy-wp-custom.local user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
# wpcustompaths is overridden by sqcdy-wp-custom.local (auto-generated; do not edit here).
wpcustompaths =

# (?i) = case-insensitive.
# [^"]* avoids backtracking risk inside quoted log fields.
failregex = (?i)^<HOST> - - \[.*?\] "\S+ [^"]*(?:%(wpcustompaths)s)[^"]*" \d+
