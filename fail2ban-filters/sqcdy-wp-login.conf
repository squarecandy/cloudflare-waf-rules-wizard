# =============================================================================
# sqcdy-wp-login.conf — WordPress login brute-force filter
#
# Catches repeated POST to wp-login.php returning 200 (failed logins return 200;
# successful logins redirect with 302).
# Single-file filter — edit here, then deploy and reload:
#   scp fail2ban-filters/sqcdy-wp-login.conf user@host:/etc/fail2ban/filter.d/
#   ssh user@host "sudo fail2ban-client reload"
# =============================================================================

[Definition]
# Note: wp-login returns 200 on failed login, 302 on success.
failregex = ^<HOST>.* "POST .*/wp-login.php([/\?#\\].*)? HTTP/.*" 200
