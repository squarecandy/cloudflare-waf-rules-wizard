# Fail2Ban action configuration for Cloudflare integration
# This file should be placed in /etc/fail2ban/action.d/cloudflare-block.conf
#
# Cloudflare list updates are handled entirely by cloudflare-fail2ban-sync
# running on cron. actionban and actionunban are intentionally disabled here
# to avoid API rate limiting from burst ban/unban events during attacks.

[Definition]

# Option: actionstart
# Notes.: command executed once at the start of Fail2Ban
# Values: CMD
actionstart =

# Option: actionstop
# Notes.: command executed once at the end of Fail2Ban
# Values: CMD
actionstop =

# Option: actioncheck
# Notes.: command executed once before each actionban command
# Values: CMD
actioncheck =

# Option: actionban
# Disabled: sync cron handles Cloudflare list updates
actionban =

# Option: actionunban
# Disabled: sync cron handles Cloudflare list updates
actionunban =

[Init]
name = default
