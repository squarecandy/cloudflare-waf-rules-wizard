# Fail2Ban action configuration for Cloudflare integration
# This file should be placed in /etc/fail2ban/action.d/cloudflare-block.conf
#
# This action calls the cloudflare-fail2ban-block script when an IP is banned

[Definition]

# Option: actionstart
# Notes.: command executed once at the start of Fail2Ban
# Values: CMD
actionstart =

# Option: actionstop
# Notes.: command executed once at the end of Fail2Ban
# Values: CMD
actionstop =

# Option: actioncheck
# Notes.: command executed once before each actionban command
# Values: CMD
actioncheck =

# Option: actionban
# Notes.: command executed when banning an IP. Take care that the
#         command is executed with Fail2Ban user rights.
# Tags:   <ip>  IP address
#         <failures>  number of failures
#         <time>  unix timestamp of the ban time
# Values: CMD
actionban = <script_path> <ip> <name>

# Option: actionunban
# Notes.: command executed when unbanning an IP. Take care that the
#         command is executed with Fail2Ban user rights.
# Tags:   <ip>  IP address
#         <failures>  number of failures
#         <time>  unix timestamp of the ban time
# Values: CMD
actionunban = <unban_script_path> <ip> <name>

[Init]

# Path to the cloudflare-fail2ban-block script
# Update this to match your installation path
script_path = /usr/local/bin/cloudflare-fail2ban-block

# Path to the cloudflare-fail2ban-unban script
unban_script_path = /usr/local/bin/cloudflare-fail2ban-unban

# Name of the jail - this is passed automatically by fail2ban
name = default
