# =============================================================================
# sqcdy-jails.conf — Custom fail2ban jails for squarecandy managed servers
#
# Deploy to /etc/fail2ban/jail.d/ — does NOT modify Plesk's jail.local.
# Loaded after jail.local; settings here take precedence over same-named
# sections in jail.local for any keys that appear in both.
#
# Jails managed here:
#   sqcdy-badbots       — known bad user agents (filter: sqcdy-badbots)
#   sqcdy-wp-custom     — WordPress path probes (filter: sqcdy-wp-custom)
#   sqcdy-wp-login      — WP login brute force (filter: sqcdy-wp-login)
#   sqcdy-404-php       — PHP file 4xx probes (filter: sqcdy-404-php)
#   sqcdy-php-redirect  — PHP file 301/302 redirect probes (filter: sqcdy-php-redirect)
#   sqcdy-fast-404      — broad 4xx flood (filter: sqcdy-fast-404)
#
# See also: /etc/fail2ban/filter.d/sqcdy-*.conf and sqcdy-badbots.local,
#           sqcdy-wp-custom.local (auto-generated from rules.php).
#
# After deploying, reload fail2ban:
#   sudo fail2ban-client reload
# =============================================================================

# =============================================================================
# sqcdy-badbots — Block known bad user agents
# Filter: sqcdy-badbots.conf (failregex) + sqcdy-badbots.local (UA list,
#         auto-generated from $aggressive_crawlers_all in rules.php).
# Zero tolerance: one match = 24h ban.
# =============================================================================
[sqcdy-badbots]
bantime  = 86400
maxretry = 1
findtime = 3600
enabled  = true
filter   = sqcdy-badbots
action   = iptables-multiport[name=BadBots, port="http,https"]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log

# =============================================================================
# sqcdy-wp-custom — Block WordPress path probes
# Filter: sqcdy-wp-custom.conf (failregex) + sqcdy-wp-custom.local (path list,
#         auto-generated from $wp_path_strings in rules.php).
# Zero tolerance: one probe = 24h ban. Includes Plesk panel ports 7080/7081.
# =============================================================================
[sqcdy-wp-custom]
bantime  = 86400
maxretry = 1
findtime = 3600
enabled  = true
filter   = sqcdy-wp-custom
action   = iptables-multiport[name=WPCustom, port="http,https,7080,7081"]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log

# =============================================================================
# sqcdy-wp-login — Block WordPress login brute force
# Filter: sqcdy-wp-login.conf
# POST to wp-login.php returning 200 = failed login (success returns 302).
# 12 failures in 4 minutes = 30 min ban.
# =============================================================================
[sqcdy-wp-login]
bantime  = 1800
maxretry = 12
findtime = 240
enabled  = true
filter   = sqcdy-wp-login
action   = iptables-multiport[name=WPLogin, port="http,https"]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log

# =============================================================================
# sqcdy-404-php — Block PHP file 4xx probes
# Filter: sqcdy-404-php.conf
# 10 PHP 4xx responses in 2 minutes = 24h ban.
# =============================================================================
[sqcdy-404-php]
bantime  = 86400
maxretry = 10
findtime = 120
enabled  = true
filter   = sqcdy-404-php
action   = iptables-multiport[name=PHP404, port="http,https"]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log

# =============================================================================
# sqcdy-php-redirect — Block PHP file 301/302 redirect probes
# Filter: sqcdy-php-redirect.conf
# Higher threshold than sqcdy-404-php to reduce false positives from
# legitimate redirects (http→https, trailing-slash, etc.).
# 10 redirects in 1 minutes = 30 min ban (softer: easier to recover from FP).
# =============================================================================
[sqcdy-php-redirect]
bantime  = 1800
maxretry = 10
findtime = 60
enabled  = true
filter   = sqcdy-php-redirect
action   = iptables-multiport[name=PHPRedirect, port="http,https"]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log

# =============================================================================
# sqcdy-fast-404 — Block broad 4xx flood
# Filter: sqcdy-fast-404.conf
# High maxretry (100) because generic 404s include incidental legitimate traffic.
# =============================================================================
[sqcdy-fast-404]
bantime  = 86400
maxretry = 100
findtime = 300
enabled  = true
filter   = sqcdy-fast-404
action   = iptables-allports[name=Fast404]
logpath  = /var/www/vhosts/system/*/logs/*access*log
	/var/www/vhosts/*/logs/*/*access*log
	/var/log/httpd/*access_log
